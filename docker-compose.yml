services:
  ingestion-service:
    build:
      context: .
      dockerfile: src/IngestionService/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=miniscada;Username=scada;Password=scada123
      - NotificationService__BaseUrl=http://notification-service:8080
      - AesKey=++ZUmvjNq7JVGO40kSeFFSn0/mGLaRaGGPvL5SvwdAc=
    depends_on:
      - postgres

  notification-service:
    build:
      context: .
      dockerfile: src/NotificationService/Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080

  consensus-service:
    build:
      context: .
      dockerfile: src/ConsensusService/Dockerfile
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: miniscada
      POSTGRES_USER: scada
      POSTGRES_PASSWORD: scada123
    ports:
      - "5432:5432"
  
  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - ingestion-service
      - notification-service
    environment:
      - ASPNETCORE_URLS=http://+:8080
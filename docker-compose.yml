services:
  ingestion-service:
    build:
      context: ./IngestionService
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=miniscada;Username=postgres;Password=postgres
      - NotificationService__BaseUrl=http://notification-service:8080
    depends_on:
      - postgres
  notification-service:
    build:
      context: ./NotificationService
    ports:
      - "5003:8080"
  consensus-service:
    build:
      context: ./ConsensusService
    ports:
      - "5004:8080"
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
